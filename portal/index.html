<!doctype html>
<html lang="zh-Hant" class="al-theme-hacker">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArchLens Suite</title>
  <!--
    ArchLens 系列入口站（Phase 3 / 反孤島）。
    單一靜態頁，於執行時 fetch ../suite-manifest.json（系列單一事實來源），
    渲染 workflow pipeline + 產品卡 + 資料流。新增產品 = 只改 manifest，這頁自動更新。
    純瀏覽器端、無 build、無後端。需以 http(s) 提供（file:// 下 fetch 會被擋）。
    採用 @archlens/tokens（Phase 4）：色票來自掛在 <html> 的 .al-theme-hacker 主題包，
    本頁的區域變數僅別名到 --al-*，故結構/顏色都與系列共用契約一致。
  -->
  <link rel="stylesheet" href="../packages/tokens/tokens.css" />
  <style>
    /* 區域變數別名到系列共用 token（--al-*）；workflow 階段色為 portal 專屬，保留本地。 */
    :root {
      --bg: var(--al-bg);
      --panel: var(--al-surface);
      --panel-2: var(--al-surface-raised);
      --border: var(--al-border);
      --text: var(--al-text);
      --dim: var(--al-text-secondary);
      --accent: var(--al-accent);
      --accent-dim: #1a3d25;
      --understand: #39ff6a;
      --analyze: #4aa8ff;
      --compare: #ffb84a;
      --verify: #c77dff;
      --mono: var(--al-font-mono);
      --sans: var(--al-font-body);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--sans); line-height: 1.5;
      padding: 48px 24px 80px;
    }
    .wrap { max-width: 1080px; margin: 0 auto; }
    header { margin-bottom: 40px; }
    .brand {
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    h1 { font-size: 34px; margin: 14px 0 8px; font-weight: 700; letter-spacing: -0.01em; }
    .mission { color: var(--dim); font-size: 15px; max-width: 720px; }
    .mission .en { display: block; opacity: 0.7; font-size: 13px; margin-top: 2px; }

    h2 {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--dim);
      margin: 44px 0 18px; font-weight: 600;
    }

    /* workflow pipeline */
    .pipeline { display: flex; align-items: stretch; gap: 0; flex-wrap: wrap; }
    .stage {
      flex: 1 1 0; min-width: 150px; position: relative;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin: 0 14px 14px 0;
    }
    .stage::after {
      content: '→'; position: absolute; right: -16px; top: 50%; transform: translateY(-50%);
      color: var(--dim); font-size: 18px; z-index: 1;
    }
    .stage:last-child { margin-right: 0; }
    .stage:last-child::after { content: ''; }
    .stage .n { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .stage .s { font-family: var(--mono); font-weight: 700; font-size: 14px; margin-top: 4px; text-transform: capitalize; }
    .stage .p { font-size: 13px; color: var(--dim); margin-top: 2px; }
    .stage[data-stage="understand"] { border-top: 2px solid var(--understand); }
    .stage[data-stage="analyze"]    { border-top: 2px solid var(--analyze); }
    .stage[data-stage="compare"]    { border-top: 2px solid var(--compare); }
    .stage[data-stage="verify"]     { border-top: 2px solid var(--verify); }

    /* product cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card .top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .card .name { font-size: 18px; font-weight: 700; }
    .badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--dim);
      white-space: nowrap;
    }
    .badge[data-stage="understand"] { color: var(--understand); border-color: var(--understand); }
    .badge[data-stage="analyze"]    { color: var(--analyze); border-color: var(--analyze); }
    .badge[data-stage="compare"]    { color: var(--compare); border-color: var(--compare); }
    .badge[data-stage="verify"]     { color: var(--verify); border-color: var(--verify); }
    .tagline { font-size: 13.5px; color: var(--text); }
    .tagline .en { display: block; color: var(--dim); font-size: 12px; margin-top: 2px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 5px;
      background: var(--panel-2); color: var(--dim); border: 1px solid var(--border);
    }
    .flow { font-family: var(--mono); font-size: 11.5px; color: var(--dim); }
    .flow b { color: var(--accent); font-weight: 600; }
    .actions { display: flex; gap: 8px; margin-top: auto; padding-top: 6px; }
    .btn {
      font-family: var(--mono); font-size: 12px; text-decoration: none; padding: 7px 12px;
      border-radius: 7px; border: 1px solid var(--border); color: var(--text); transition: all .12s;
    }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: var(--accent-dim); }
    .btn.ghost:hover { border-color: var(--dim); }

    footer { margin-top: 56px; color: var(--dim); font-family: var(--mono); font-size: 11px; }
    a.repo { color: var(--dim); }
    .error { background: var(--panel); border: 1px solid var(--compare); border-radius: 10px; padding: 20px; color: var(--text); font-family: var(--mono); font-size: 13px; }
    .error code { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="dot"></span><span id="suite-name">ArchLens</span> Suite</div>
      <h1>一套連續的維護工作流，四個產品</h1>
      <p class="mission" id="mission"></p>
    </header>

    <section>
      <h2>Workflow</h2>
      <div class="pipeline" id="pipeline"></div>
    </section>

    <section>
      <h2>Products</h2>
      <div class="grid" id="grid"></div>
      <div id="error"></div>
    </section>

    <footer id="footer"></footer>
  </div>

  <script>
    // 雙語字串以 " / " 分隔（zh / en），拆開分別渲染
    function splitBilingual(s) {
      const i = (s || '').indexOf(' / ');
      return i === -1 ? { zh: s || '', en: '' } : { zh: s.slice(0, i), en: s.slice(i + 3) };
    }
    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html != null) e.innerHTML = html;
      return e;
    }

    function renderPipeline(m) {
      const pipeline = document.getElementById('pipeline');
      const byStage = Object.fromEntries(m.products.map(p => [p.stage, p]));
      (m.stages || []).forEach(stage => {
        const p = byStage[stage];
        const card = el('div', 'stage');
        card.dataset.stage = stage;
        card.appendChild(el('div', 'n', String((m.stages.indexOf(stage) + 1)).padStart(2, '0')));
        card.appendChild(el('div', 's', stage));
        card.appendChild(el('div', 'p', p ? p.name.replace(/^ArchLens /, '') : '—'));
        pipeline.appendChild(card);
      });
    }

    function renderCards(m) {
      const grid = document.getElementById('grid');
      m.products.forEach(p => {
        const tag = splitBilingual(p.tagline);
        const card = el('div', 'card');

        const top = el('div', 'top');
        top.appendChild(el('div', 'name', p.name));
        const badge = el('span', 'badge', p.stage);
        badge.dataset.stage = p.stage;
        top.appendChild(badge);
        card.appendChild(top);

        card.appendChild(el('div', 'tagline', `${tag.zh}${tag.en ? `<span class="en">${tag.en}</span>` : ''}`));

        const chips = el('div', 'chips');
        (p.solves || []).forEach(s => chips.appendChild(el('span', 'chip', s)));
        card.appendChild(chips);

        const consumes = (p.consumes && p.consumes.length) ? p.consumes.join(', ') : '—';
        const produces = (p.produces && p.produces.length) ? p.produces.join(', ') : '—';
        card.appendChild(el('div', 'flow', `consumes <b>${consumes}</b> → produces <b>${produces}</b>`));

        const actions = el('div', 'actions');
        if (p.url) {
          const open = el('a', 'btn primary', '開啟 ↗');
          open.href = p.url; open.target = '_blank'; open.rel = 'noopener';
          actions.appendChild(open);
        }
        if (p.repo) {
          const repo = el('a', 'btn ghost', 'GitHub');
          repo.href = p.repo; repo.target = '_blank'; repo.rel = 'noopener';
          actions.appendChild(repo);
        }
        card.appendChild(actions);

        grid.appendChild(card);
      });
    }

    async function main() {
      try {
        const res = await fetch('../suite-manifest.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const m = await res.json();

        document.getElementById('suite-name').textContent = m.suite || 'ArchLens';
        const mission = splitBilingual(m.mission);
        document.getElementById('mission').innerHTML =
          `${mission.zh}${mission.en ? `<span class="en">${mission.en}</span>` : ''}`;

        renderPipeline(m);
        renderCards(m);

        document.getElementById('footer').textContent =
          `manifest schemaVersion ${m.schemaVersion} · envelope ${m.envelopeVersion} · ${m.products.length} products`;
      } catch (err) {
        document.getElementById('error').innerHTML =
          `<div class="error">無法載入 <code>../suite-manifest.json</code>（${err.message}）。<br>` +
          `此頁需以 http(s) 提供（file:// 下瀏覽器會擋 fetch）。例如在 <code>ArchLens_Series/</code> 跑 ` +
          `<code>npx serve</code> 後開 <code>/portal/</code>。</div>`;
      }
    }
    main();
  </script>
</body>
</html>
